services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: world-cup-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/dev.db
      - ODDS_API_KEY=${ODDS_API_KEY:-}
    volumes:
      # SQLite 数据库持久化（重要！否则容器重启数据丢失）
      - ./data:/app/data
      # 如果需要映射 .env.local
      - ./.env.local:/app/.env.local:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/matches"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Nginx 反向代理（可选，如果你需要 SSL 或域名绑定）
  # nginx:
  #   image: nginx:alpine
  #   container_name: world-cup-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro  # 证书目录
  #   depends_on:
  #     - app
  #   networks:
  #     - app-network

networks:
  app-network:
    driver: bridge
